{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2 class="auth-title">Join <span class="text-gradient">DeepFakeGuard</span></h2>
        <p class="auth-desc">Create your account to access our cloud-based detection system.</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="input-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required placeholder="JohnDoe">
            </div>
            
            <div class="input-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            
            <div class="input-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary w-100 mt-3">Create Account</button>
        </form>
        
        <p class="auth-footer mt-4 text-center">
            Already have an account? <a href="{{ url_for('login') }}" class="text-link">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
